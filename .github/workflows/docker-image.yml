name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tags=${REPO}:${{ github.ref_name }},${REPO}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${REPO}:latest,${REPO}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build the Docker image
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          TAG_ARGS=""
          for tag in "${TAGS[@]}"; do TAG_ARGS="$TAG_ARGS --tag $tag"; done
          docker build . --file Dockerfile $TAG_ARGS

      - name: Push to GitHub Container Registry
        if: github.event_name != 'pull_request'
        run: |
          IFS=',' read -ra TAGS <<< "${{ steps.tags.outputs.tags }}"
          for tag in "${TAGS[@]}"; do docker push "$tag"; done
